<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Nox API favicon: minimalist wand with spark — Harry Potter inspired -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>
  </defs>
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="30" fill="#2D2B2A"/>
  <!-- Wand — diagonal line -->
  <line x1="18" y1="48" x2="42" y2="16" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Spark at wand tip -->
  <circle cx="44" cy="14" r="2.5" fill="#E8C170"/>
  <!-- Small star rays -->
  <line x1="44" y1="8" x2="44" y2="11" stroke="#E8C170" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="17" x2="44" y2="20" stroke="#E8C170" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="14" x2="41" y2="14" stroke="#E8C170" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="14" x2="50" y2="14" stroke="#E8C170" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tiny diagonal rays -->
  <line x1="40" y1="10" x2="42" y2="12" stroke="#E8C170" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="10" x2="46" y2="12" stroke="#E8C170" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="40" y1="18" x2="42" y2="16" stroke="#E8C170" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="18" x2="46" y2="16" stroke="#E8C170" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
