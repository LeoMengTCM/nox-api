# Nox API Docker Compose Configuration
#
# Quick Start:
#   1. docker compose up -d
#   2. Access at http://localhost:3000
#   3. Default admin: root / 123456
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and its SQL_DSN
#   2. Uncomment the mysql service and its SQL_DSN
#   3. Switch depends_on from postgres to mysql
#   4. Uncomment mysql_data in volumes section
#
# IMPORTANT: Change all default passwords before deploying to production!

services:
  nox-api:
    image: drleomeng/nox-api:latest
    container_name: nox-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # Database — pick ONE, comment out the other
      - SQL_DSN=postgresql://noxapi:change_me@nox-postgres:5432/noxapi   # PostgreSQL
#      - SQL_DSN=noxapi:change_me@tcp(nox-mysql:3306)/noxapi              # MySQL

      # Redis
      - REDIS_CONN_STRING=redis://nox-redis:6379

      # General
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
#      - STREAMING_TIMEOUT=300       # Stream timeout in seconds (default 120)
#      - SESSION_SECRET=              # Required for multi-node deployment
#      - CRYPTO_SECRET=               # Required when using Redis across nodes
    depends_on:
      - nox-redis
      - nox-postgres
#      - nox-mysql
    networks:
      - nox-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nox-redis:
    image: redis:7-alpine
    container_name: nox-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - nox-network

  nox-postgres:
    image: postgres:16-alpine
    container_name: nox-postgres
    restart: always
    environment:
      POSTGRES_USER: noxapi
      POSTGRES_PASSWORD: change_me    # IMPORTANT: Change this!
      POSTGRES_DB: noxapi
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - nox-network
#    ports:
#      - "5432:5432"                  # Uncomment for external access

#  nox-mysql:
#    image: mysql:8.4
#    container_name: nox-mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: change_me  # IMPORTANT: Change this!
#      MYSQL_DATABASE: noxapi
#      MYSQL_USER: noxapi
#      MYSQL_PASSWORD: change_me       # IMPORTANT: Change this!
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - nox-network
#    ports:
#      - "3306:3306"                   # Uncomment for external access

volumes:
  pg_data:
  redis_data:
#  mysql_data:

networks:
  nox-network:
    driver: bridge
